<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seven theorems walk into a war</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111118;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;padding:24px}
  .card{max-width:900px;width:100%;padding:56px 48px}
  .numbers{display:flex;gap:40px;flex-wrap:wrap;margin-bottom:32px}
  .block{flex:1;min-width:180px}
  .num{font-size:60px;font-weight:700;color:#ffffff;line-height:1;letter-spacing:-2px}
  .label{font-size:13px;color:#777;margin-top:8px;letter-spacing:0.06em;line-height:1.5;font-family:'Helvetica Neue',sans-serif}
  .divider{height:1px;background:#2a2a3a;margin:32px 0}
  .footer{font-size:11px;color:#444;letter-spacing:0.12em;font-family:'Helvetica Neue',sans-serif}
  .sep{width:1px;background:#2a2a3a;align-self:stretch;margin:0 8px}
  @media(max-width:600px){.num{font-size:40px}.numbers{gap:24px}}
</style>
</head>
<body>
<div class="card">
  <div class="numbers">
    <div class="block">
      <div class="num">35,000</div>
      <div class="label">STRIKES OVER<br>EIGHTEEN MONTHS</div>
    </div>
    <div class="sep"></div>
    <div class="block">
      <div class="num">360m</div>
      <div class="label">LETHAL BLAST RADIUS<br>PER 2,000 LB BOMB</div>
    </div>
    <div class="sep"></div>
    <div class="block">
      <div class="num">2,400</div>
      <div class="label">PEOPLE INSIDE EACH<br>BLAST RADIUS</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="footer">THE REST OF THIS PIECE IS ARITHMETIC</div>
</div>
</body>
</html>
